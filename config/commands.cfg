[gcode_shell_command backup_cfg]
command: sh /home/pi/klipper_config/nonconfig/autocommit.sh
timeout: 30.
verbose: True

[gcode_shell_command ip]
command: sh /home/pi/klipper_config/nonconfig/ip.sh
timeout: 30.
verbose: True

[gcode_shell_command updateskipFirst]
command: sh /home/pi/klipper_config/nonconfig/skipFirst.sh
timeout: 30.
verbose: True

[gcode_shell_command webcamRestart]
command: sh /home/pi/klipper_config/nonconfig/webcam.sh
timeout: 30.
verbose: True

[gcode_macro BACKUP_CFG]
gcode:
    RUN_SHELL_COMMAND CMD=backup_cfg


[gcode_macro GET_IP]
gcode:
    RUN_SHELL_COMMAND CMD=ip

[gcode_macro UPDATE_SKIP]
gcode:
    RUN_SHELL_COMMAND CMD=updateskipFirst

[gcode_macro WEBCAM_RESTART]
gcode:
    RUN_SHELL_COMMAND CMD=webcamRestart